name: Deploy to QA

on:
  push:
    branches: [qa]

env:
  BACKEND_IMAGE: matthewkilleen99/taskflow-backend
  FRONTEND_IMAGE: matthewkilleen99/taskflow-frontend

jobs:
  build-and-deploy:
    name: Build images and deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:qa

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:qa
          build-args: |
            NG_CONFIG=qa

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd /opt/taskflow
            git fetch origin qa
            git reset --hard origin/qa
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.qa.yml \
              --env-file .env.qa \
              pull
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.qa.yml \
              --env-file .env.qa \
              up -d
            docker image prune -f