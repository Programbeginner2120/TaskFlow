# QA / test environment override for Docker Compose.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.qa.yml up --build

services:
  backend:
    image: matthewkilleen99/taskflow-backend:qa
    environment:
      SPRING_PROFILES_ACTIVE: qa

  frontend:
    image: matthewkilleen99/taskflow-frontend:qa
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
