<app-task-list-view
    [componentTitle]="list()?.name ?? ''"
    [tasks]="listTasks()"
    [lists]="lists()"
    [searchQuery]="searchQuery()"
    [defaultListId]="listId()"
    [dragAndDropEnabled]="true"
    [sortOption]="TaskListViewSortOptions.POSITION"
    (taskSelected)="taskSelected.emit($event)">
</app-task-list-view>
