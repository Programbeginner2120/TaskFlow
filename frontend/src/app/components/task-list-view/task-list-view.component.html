<div class="task-list-view">

    <!-- Page header -->
    <div class="page-header">
        <h1 class="page-title">{{ componentTitle() }}</h1>
        <p class="page-subtitle" aria-live="polite">
            {{ incompleteCount() }} {{ incompleteCount() === 1 ? 'task' : 'tasks' }} remaining
        </p>
    </div>

    <!-- Add task bar -->
    <div class="add-task-bar" role="group" aria-label="Add a new task">
        <span class="add-task-plus" aria-hidden="true">+</span>
        <input
            class="add-task-input"
            type="text"
            placeholder="Add a task..."
            [value]="newTaskTitle()"
            (input)="newTaskTitle.set($any($event.target).value)"
            (keydown)="onAddTaskKeydown($event)"
            aria-label="New task title"
        />
        <app-datepicker [(value)]="newTaskDueDate"></app-datepicker>
    </div>

    <!-- Task list -->
    <ul cdkDropList [cdkDropListDisabled]="!dragAndDropEnabled()" (cdkDropListDropped)="drop($event)" class="task-list" aria-label="Tasks">
        @for (task of sortedTasks(); track task.id) {
            @let list = getListForTask(task.listId);
            @let progress = getSubtaskProgress(task);

            <li cdkDrag class="task-row" [class.completed]="task.completed">

                <!-- Completion toggle -->
                <button
                    class="task-toggle"
                    type="button"
                    [attr.aria-label]="task.completed ? 'Mark ' + task.title + ' as incomplete' : 'Mark ' + task.title + ' as complete'"
                    [attr.aria-pressed]="task.completed"
                    (click)="toggleTask(task.id)">
                    @if (task.completed) {
                        <lucide-icon [img]="checkCircleIcon" [size]="20" aria-hidden="true"></lucide-icon>
                    } @else {
                        <lucide-icon [img]="circleIcon" [size]="20" aria-hidden="true"></lucide-icon>
                    }
                </button>

                <!-- Task content -->
                <button
                    class="task-content"
                    type="button"
                    [attr.aria-label]="'Open details for ' + task.title"
                    (click)="openDetails(task)">
                    <span class="task-title" [class.completed-title]="task.completed">
                        {{ task.title }}
                    </span>
                    <span class="task-meta">
                        @if (task.dueDate) {
                            <span class="task-meta-date">{{ formatDate(task.dueDate) }}</span>
                        }
                        @if (list) {
                            @if (task.dueDate) {
                                <span class="task-meta-separator" aria-hidden="true">•</span>
                            }
                            <span
                                class="task-meta-dot"
                                [style.backgroundColor]="list.color"
                                aria-hidden="true">
                            </span>
                            <span class="task-meta-list">{{ list.name }}</span>
                        }
                        @if (progress) {
                            @if (task.dueDate || list) {
                                <span class="task-meta-separator" aria-hidden="true">•</span>
                            }
                            <span class="task-meta-progress" [attr.aria-label]="progress + ' subtasks completed'">
                                {{ progress }}
                            </span>
                        }
                    </span>
                </button>

                <!-- Chevron -->
                <lucide-icon
                    class="task-chevron"
                    [img]="chevronRightIcon"
                    [size]="16"
                    aria-hidden="true">
                </lucide-icon>

                <!-- Drop placeholder: shown at the target position in the list -->
                <div *cdkDragPlaceholder class="task-drag-placeholder"></div>

                <!-- Drag preview: card that follows the cursor while dragging -->
                <div *cdkDragPreview class="task-drag-preview">
                    <lucide-icon
                        [img]="task.completed ? checkCircleIcon : circleIcon"
                        [size]="18"
                        aria-hidden="true">
                    </lucide-icon>
                    <span class="drag-preview-title" [class.completed-title]="task.completed">
                        {{ task.title }}
                    </span>
                </div>

            </li>
        }
    </ul>

</div>
