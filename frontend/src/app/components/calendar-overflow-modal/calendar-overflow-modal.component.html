<div class="modal-backdrop" role="presentation" (click)="onBackdropClick()"></div>

<div
    class="modal-card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="overflow-modal-title">

    <!-- Header -->
    <div class="modal-header">
        <h3 class="modal-title" id="overflow-modal-title">
            @if (date(); as d) {
                {{ d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' }) }}
            } @else {
                Tasks
            }
        </h3>
        <button class="close-btn" type="button" aria-label="Close" (click)="close.emit()">
            <lucide-icon [img]="closeIcon" [size]="18" aria-hidden="true"></lucide-icon>
        </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
        @if (tasks().length === 0) {
            <p class="empty-state">No tasks for this date.</p>
        } @else {
            <ul class="task-list" aria-label="Tasks">
                @for (t of tasks(); track t.id) {
                    <li>
                        <button
                            class="task-row"
                            type="button"
                            [attr.aria-label]="'Open task: ' + t.title"
                            (click)="onTaskClick(t)">
                            <span
                                class="task-dot"
                                [class.--completed]="t.completed"
                                aria-hidden="true">
                            </span>
                            <span class="task-title" [class.--completed]="t.completed">
                                {{ t.title }}
                            </span>
                        </button>
                    </li>
                }
            </ul>
        }
    </div>
</div>
