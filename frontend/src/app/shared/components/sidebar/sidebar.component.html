<div class="sidebar-container">
    <div class="sidebar-content-container" [class.collapsed]="!isExpanded()">
        <div class="sidebar-title-container">
            <lucide-icon class="list-icon" [img]="list" [size]="20"></lucide-icon>
            <h2 class="sidebar-title">{{ sidebarTitle() }}</h2>
        </div>
        <div class="nav-items-container">
            @for (navItem of navItems(); track navItem.navItemLabel) {
                <div class="nav-item" (click)="navItem.navItemRouteFn()">
                    @if (navItem.navItemIcon) {
                        <lucide-icon class="nav-item-icon" [img]="navItem.navItemIcon" [size]="20"></lucide-icon>
                        <div class="nav-item-label">{{ navItem.navItemLabel }}</div>
                    }
                </div>
            }
        </div>
        <div class="dynamic-content-container">
            <ng-content class="dynamic-content" select="[sidebar-content]"></ng-content>
        </div>
    </div>
    @if (collapsible()) {
        <div class="sidebar-toggle-container" [class.collapsed]="!isExpanded()" (click)="isExpanded.set(!isExpanded())">
            @if (isExpanded()) {
                <lucide-icon class="expand-icon" [img]="arrowLeftFromLine" [size]="20"></lucide-icon>
            } @else {
                <lucide-icon class="expand-icon" [img]="arrowRightFromLine" [size]="20"></lucide-icon>
            }
        </div>
    }
</div>
