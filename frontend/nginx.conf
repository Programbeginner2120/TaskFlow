# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name 52.73.236.177.nip.io;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name 52.73.236.177.nip.io;

    ssl_certificate     /etc/letsencrypt/live/52.73.236.177.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/52.73.236.177.nip.io/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Angular app — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
