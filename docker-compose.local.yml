# Local / dev override for Docker Compose.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# What this does:
#   - Builds the backend using the 'dev' Dockerfile stage (runs gradlew bootRun directly)
#   - Volume-mounts backend source so Spring DevTools can hot-restart on class changes
#   - Builds the frontend using the 'dev' Dockerfile stage (runs ng serve)
#   - Volume-mounts frontend src for Angular hot module reload on port 4200

services:
  backend:
    build:
      target: dev
    environment:
      SPRING_PROFILES_ACTIVE: local
    volumes:
      - ./backend:/app
    # Keep stdin open so Gradle's interactive output works correctly
    stdin_open: true
    tty: true

  frontend:
    build:
      target: dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
