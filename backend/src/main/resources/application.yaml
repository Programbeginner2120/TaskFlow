spring:
  application:
    name: TaskFlow

  # Datasource — SPRING_DATASOURCE_* env vars from Docker override these automatically
  datasource:
    url: jdbc:postgresql://localhost:5432/taskflow
    username: taskflow
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/liquibase.xml

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# MyBatis Configuration
mybatis:
  mapper-locations:
    - classpath:db/mapper/generated/**/*.xml
    - classpath:db/mapper/custom/**/*.xml
  type-aliases-package: com.killeen.taskflow.db.model.generated
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

# App-level config
app:
  cors:
    allowed-origins: "http://localhost:4200,http://127.0.0.1:4200,http://localhost,http://127.0.0.1"
  email:
    from-address: ${MAIL_FROM}
    base-url: ${APP_BASE_URL:http://localhost:4200}
    verification-token-ttl-hours: 24
    reset-token-ttl-hours: 1
  encryption:
    password: ${ENCRYPTION_PASSWORD}
    salt: ${ENCRYPTION_SALT}
  cron:
    secret: ${CRON_SECRET}

logging:
  level:
    root: INFO
    com.killeen: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"