# Profile: prod — production environment.
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Run with:      docker compose up  (docker-compose.yml sets this profile by default)

app:
  cors:
    allowed-origins: "http://localhost:4200,http://127.0.0.1:4200,http://localhost,http://127.0.0.1"
  email:
    base-url: ${APP_BASE_URL:https://taskflow.com}

management:
  endpoints:
    web:
      exposure:
        # Only expose health in production; keep other actuator endpoints locked down
        include: health

logging:
  level:
    root: WARN
    com.killeen: INFO
    org.springframework.web: WARN
